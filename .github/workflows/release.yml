name: Release

# Tag-driven release pipeline. Pushing a `vX.Y.Z` tag triggers the build,
# sign, notarize, and draft-Release sequence. Job 2 (publish-metadata.yml)
# fires after Derek manually publishes the draft.
on:
  push:
    tags:
      - 'v*.*.*'

# Principle of least privilege: this workflow writes to this repo's Releases
# and nothing else. No cross-repo, no issues, no pull-requests.
permissions:
  contents: write

# Single concurrency group per tag — if someone pushes a tag twice by
# accident, the second run cancels the first.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false   # Never cancel in-progress signing; just queue.

env:
  # Pinned tools. Bumping requires a PR that also updates the cache key.
  # Xcode path intentionally unset — we rely on macos-26-arm64's default
  # Xcode (26.2, ships macOS 26.2 SDK which has FSVolume.MountOptions
  # used by ContextFSExt/Volume.swift).
  # Pinned to match the framework version Xcode resolves via SPM (Xcode
  # project's Package.resolved pins 2.9.1). The sign_update CLI from
  # Sparkle 2.x signs 2.x-embedded bundles regardless of minor version,
  # but keeping these aligned avoids subtle runtime/sign mismatches.
  SPARKLE_VERSION: '2.9.1'
  SPARKLE_TARBALL_SHA256: 'c0dde519fd2a43ddfc6a1eb76aec284d7d888fe281414f9177de3164d98ba4c7'
  # One source of truth for signing identity + team — avoids typos across
  # the four sites that sign artifacts (nested binaries, .app, DMG, CLI tarballs).
  DEVELOPMENT_TEAM: RDQSC33B2X
  DEVELOPER_ID_IDENTITY: 'Developer ID Application: Xinzhe Wang (RDQSC33B2X)'

jobs:
  build-and-sign:
    name: Build, sign, notarize, draft Release
    # macos-26 (Intel): GA since Feb 2026. Ships Xcode 26.x with macOS 26
    # SDK — required because ContextFSExt/Volume.swift uses
    # `FSVolume.MountOptions`, a macOS 26 SDK addition.
    #
    # Intel rather than macos-26-arm64: the arm64 pool had 65+ min queue
    # waits during the v0.0.1 dress rehearsal. Cargo cross-compiles to
    # aarch64 from an Intel host via `--target aarch64-apple-darwin`, so
    # `lipo` still produces a working universal binary. xcodebuild on
    # Intel can also build for arm64 targets.
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # -------- Checkout + toolchain ------------------------------------

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # scripts/release.sh used `git rev-list --count HEAD` for build number

      - name: Select Xcode 26.4 (matches local dev; has FSVolume.MountOptions)
        run: |
          # macos-26's default Xcode is 26.2 (macOS 26.2 SDK) — that SDK does
          # NOT have FSVolume.MountOptions. Pinned to 26.4 to match Derek's
          # local dev environment (Xcode 26.4.1) and ship macOS 26.4 SDK.
          # If runner inventory rotates and 26.4 goes away, the `if -d` guard
          # falls back to the default and emits a clear warning.
          if [ -d /Applications/Xcode_26.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app
          else
            echo "::warning::Xcode_26.4.app missing; falling back to default"
          fi
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          cache-on-failure: false

      - name: Install create-dmg + protobuf + swift-protobuf via Homebrew
        run: |
          # create-dmg: builds the notarized .dmg in a later step.
          # protobuf: provides `protoc`, used by:
          #   - `fskit-rs`'s prost build script (Rust side)
          #   - pbxproj's protoc build rule for ContextFSExt (Swift side)
          # swift-protobuf: provides `protoc-gen-swift`, the plugin protoc
          #   needs to emit Swift via `--swift_out` in the pbxproj build rule.
          brew install create-dmg protobuf swift-protobuf
          create-dmg --version
          protoc --version
          protoc-gen-swift --version

      - name: Cache + install Sparkle CLI tools
        id: sparkle-tools
        uses: actions/cache@v4
        with:
          path: /tmp/sparkle-tools
          key: sparkle-${{ env.SPARKLE_VERSION }}

      - name: Download Sparkle CLI tools (cache miss)
        if: steps.sparkle-tools.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /tmp/Sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          # Verify SHA-256 if a value is configured (3e bootstrap will set it)
          if [ -n "$SPARKLE_TARBALL_SHA256" ]; then
            echo "${SPARKLE_TARBALL_SHA256}  /tmp/Sparkle.tar.xz" | shasum -a 256 --check
          else
            echo "::warning::SPARKLE_TARBALL_SHA256 not set; skipping integrity check"
          fi
          mkdir -p /tmp/sparkle-tools
          tar -xJf /tmp/Sparkle.tar.xz -C /tmp/sparkle-tools

      # -------- Version assertion --------------------------------------

      - name: Read VERSION + assert match with tag
        id: version
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG="${GITHUB_REF_NAME}"
          if [ "v$VERSION" != "$TAG" ]; then
            echo "::error::VERSION file says '$VERSION' but tag is '$TAG' (expected 'v$VERSION')"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Assert release notes exist
        run: |
          NOTES=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -s "$NOTES" ]; then
            echo "::error::$NOTES is missing or empty"
            exit 1
          fi

      # -------- Signing keychain + profiles ---------------------------

      - name: Import Developer ID cert into temp keychain
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$DEVELOPER_ID_P12_BASE64" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import "$CERT_PATH" \
            -k build.keychain \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm -f "$CERT_PATH"
          security find-identity -p codesigning -v build.keychain

      - name: Install provisioning profiles
        env:
          DEVELOPER_ID_APP_PROFILE_BASE64: ${{ secrets.DEVELOPER_ID_APP_PROFILE_BASE64 }}
          DEVELOPER_ID_EXT_PROFILE_BASE64: ${{ secrets.DEVELOPER_ID_EXT_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$DEVELOPER_ID_APP_PROFILE_BASE64" | base64 -D -o "$PROFILE_DIR/contextfs_app.provisionprofile"
          echo "$DEVELOPER_ID_EXT_PROFILE_BASE64" | base64 -D -o "$PROFILE_DIR/contextfs_ext.provisionprofile"

      # -------- Rust universal build ----------------------------------

      - name: Build Rust workspace (universal)
        run: |
          # Single invocation: cargo walks the dep graph once and builds both
          # targets from the same plan, instead of twice sequentially.
          cargo build --release \
            --target aarch64-apple-darwin \
            --target x86_64-apple-darwin \
            -p ctxfs -p ctxfs-app-helper
          mkdir -p /tmp/universal
          lipo -create -output /tmp/universal/ctxfs \
            target/aarch64-apple-darwin/release/ctxfs \
            target/x86_64-apple-darwin/release/ctxfs
          lipo -create -output /tmp/universal/ctxfs-app-helper \
            target/aarch64-apple-darwin/release/ctxfs-app-helper \
            target/x86_64-apple-darwin/release/ctxfs-app-helper
          file /tmp/universal/ctxfs

      # -------- Xcode build + nested signing --------------------------

      - name: Build ContextFS.app via xcodebuild (Developer ID)
        env:
          CTXFS_PREBUILT_RUST_DIR: /tmp/universal   # build-rust.sh honors this
        run: |
          set -o pipefail
          # No log-truncation pipe: when xcodebuild fails we need the full
          # error context (a prior '| tail -20' hid BUILD FAILED during the
          # v0.0.1 dress rehearsal and the failure only surfaced two steps
          # downstream at codesign-verify).
          xcodebuild \
            -project swift/ContextFS/ContextFS.xcodeproj \
            -scheme ContextFS \
            -configuration Release \
            -derivedDataPath /tmp/ctxfs-build \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_IDENTITY" \
            OTHER_CODE_SIGN_FLAGS="--options runtime --timestamp"
          echo "--- built product ---"
          ls /tmp/ctxfs-build/Build/Products/Release/ContextFS.app/Contents/

      - name: Re-sign nested bundles with Developer ID (bottom-up)
        run: |
          # SPM-pulled Sparkle framework keeps its maintainer signatures on
          # the embedded helpers/XPC services. Those don't match our Developer
          # ID, so the notary rejects every one of them. We have to re-sign
          # each inner bundle from the leaves up, then the framework, then
          # the extension, then the Rust binaries, then the outer app.
          # Signing a parent bundle re-computes its content hash — any later
          # change invalidates it, so order matters.
          APP=/tmp/ctxfs-build/Build/Products/Release/ContextFS.app
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework/Versions/B"

          # Function wrapper so the identity (contains spaces) gets quoted
          # correctly every time. A FLAGS="--sign $ID" string would word-split.
          sign() {
            codesign --force --sign "$DEVELOPER_ID_IDENTITY" \
              --options runtime --timestamp "$@"
          }

          # 1. Sparkle XPC services (innermost first: binary, then .xpc wrapper)
          for xpc in Downloader Installer; do
            sign "$SPARKLE/XPCServices/$xpc.xpc/Contents/MacOS/$xpc"
            sign "$SPARKLE/XPCServices/$xpc.xpc"
          done

          # 2. Sparkle helper executables
          sign "$SPARKLE/Autoupdate"
          sign "$SPARKLE/Updater.app/Contents/MacOS/Updater"
          sign "$SPARKLE/Updater.app"

          # 3. Sparkle framework itself
          sign "$APP/Contents/Frameworks/Sparkle.framework"

          # 4. FSKit extension (re-apply entitlements — get-task-allow must
          # not appear in the effective entitlements post-sign).
          codesign --force --sign "$DEVELOPER_ID_IDENTITY" \
            --options runtime --timestamp \
            --entitlements "$GITHUB_WORKSPACE/swift/ContextFS/ContextFSExt/ContextFSExt.entitlements" \
            "$APP/Contents/Extensions/ContextFSExt.appex"

          # 5. Rust binaries
          for bin in ctxfs ctxfs-app-helper; do
            if [ -f "$APP/Contents/MacOS/$bin" ]; then
              sign "$APP/Contents/MacOS/$bin"
            fi
          done

          # 6. Finally sign the outer app bundle.
          codesign --force --sign "$DEVELOPER_ID_IDENTITY" \
            --options runtime --timestamp \
            --entitlements "$GITHUB_WORKSPACE/swift/ContextFS/ContextFS/ContextFS.entitlements" \
            "$APP"

          # Verify and list the contents that got signed.
          codesign --verify --strict --verbose=4 "$APP"
          codesign --display --verbose=2 "$APP" 2>&1 | head -15

      # -------- Build DMG + sign both artifacts -----------------------

      - name: Build + sign DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP=/tmp/ctxfs-build/Build/Products/Release/ContextFS.app
          mkdir -p /tmp/dmg-artifacts
          create-dmg \
            --volname "ContextFS ${VERSION}" \
            --window-size 500 300 \
            --icon "ContextFS.app" 125 150 \
            --app-drop-link 375 150 \
            "/tmp/dmg-artifacts/ContextFS-${VERSION}.dmg" \
            "$APP"
          DMG=/tmp/dmg-artifacts/ContextFS-${VERSION}.dmg
          codesign --force --sign "$DEVELOPER_ID_IDENTITY" \
            --options runtime --timestamp "$DMG"
          ls -la /tmp/dmg-artifacts/

      # -------- Notarize .app and DMG in parallel ---------------------
      # Apple's notary service accepts concurrent submissions. Submit both
      # without --wait, poll both in parallel, then staple sequentially.
      # Cuts roughly 5-10 min off the sequential pattern.

      - name: Notarize + staple .app and DMG in parallel
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          VERSION="${{ steps.version.outputs.version }}"
          APP=/tmp/ctxfs-build/Build/Products/Release/ContextFS.app
          DMG=/tmp/dmg-artifacts/ContextFS-${VERSION}.dmg

          ditto -c -k --sequesterRsrc --keepParent "$APP" /tmp/_notary_app.zip

          # Fire both submissions without --wait so they queue concurrently at Apple.
          APP_ID=$(xcrun notarytool submit /tmp/_notary_app.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --output-format json | tee /tmp/_notary_app_submit.json | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          DMG_ID=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --output-format json | tee /tmp/_notary_dmg_submit.json | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "submitted app=$APP_ID dmg=$DMG_ID"

          # Wait for both in parallel background jobs; `wait` blocks until both finish.
          # Don't fail the step on non-zero wait — we need to keep running to fetch
          # the notarization log on Invalid status (which is where the real error is).
          xcrun notarytool wait "$APP_ID" --timeout 30m \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" || true &
          APP_WAIT=$!
          xcrun notarytool wait "$DMG_ID" --timeout 30m \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" || true &
          DMG_WAIT=$!
          wait "$APP_WAIT"; wait "$DMG_WAIT"

          # Check final status via `notarytool info`; dump the detailed rejection
          # log if either came back Invalid. Without this, Apple's Invalid surfaces
          # as 'The staple and validate action failed! Error 65' two steps later —
          # useless for debugging.
          check_status() {
            local id="$1" label="$2"
            local status
            status=$(xcrun notarytool info "$id" \
              --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" \
              --output-format json | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            echo "--- $label status: $status ---"
            if [ "$status" != "Accepted" ]; then
              echo "::error::Notarization rejected $label — fetching detailed log"
              xcrun notarytool log "$id" \
                --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID"
              return 1
            fi
          }
          check_status "$APP_ID" "app"
          check_status "$DMG_ID" "dmg"

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          xcrun stapler staple "$DMG"
          rm -f /tmp/_notary_app.zip

      # -------- Sparkle update archive --------------------------------

      - name: Create Sparkle update zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP=/tmp/ctxfs-build/Build/Products/Release/ContextFS.app
          ditto -c -k --sequesterRsrc --keepParent "$APP" "/tmp/dmg-artifacts/ContextFS-${VERSION}.zip"

      - name: Sign Sparkle zip (EdDSA)
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -o pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="/tmp/dmg-artifacts/ContextFS-${VERSION}.zip"
          KEYFILE="$RUNNER_TEMP/sparkle_priv.b64"

          # printf avoids adding a trailing newline that `echo` injects; some
          # sign_update builds are sensitive to whitespace in the key file.
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"

          # Diagnostic — doesn't reveal the key value (byte count only)
          echo "keyfile bytes: $(wc -c < "$KEYFILE")"
          [ -s "$KEYFILE" ] || { echo "::error::Sparkle key file is empty — check SPARKLE_PRIVATE_KEY secret"; exit 1; }

          # Order matters in Sparkle 2.9.x: --ed-key-file before the positional
          # input path, otherwise sign_update falls through to the keychain
          # path and errors with 'Signing key not found for account ed25519'.
          SIG=$(/tmp/sparkle-tools/bin/sign_update --ed-key-file "$KEYFILE" "$ZIP")
          echo "$SIG" > "/tmp/dmg-artifacts/ContextFS-${VERSION}.zip.sig"
          rm -f "$KEYFILE"
          # Verify round-trip
          /tmp/sparkle-tools/bin/sign_update --verify "$SIG" "$ZIP"

      # -------- CLI tarballs ------------------------------------------

      - name: Sign + package CLI tarballs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for arch in arm64 x86_64; do
            if [ "$arch" = "arm64" ]; then
              triple=aarch64-apple-darwin
            else
              triple=x86_64-apple-darwin
            fi
            BIN="target/${triple}/release/ctxfs"
            codesign --force --sign "$DEVELOPER_ID_IDENTITY" \
              --options runtime --timestamp "$BIN"
            STAGE="$RUNNER_TEMP/cli-${arch}"
            mkdir -p "$STAGE"
            cp "$BIN" "$STAGE/ctxfs"
            cp LICENSE "$STAGE/" 2>/dev/null || true
            cp README.md "$STAGE/" 2>/dev/null || true
            tar -czf "/tmp/dmg-artifacts/ctxfs-${VERSION}-darwin-${arch}.tar.gz" -C "$STAGE" .
          done

      - name: Generate checksums.txt
        run: |
          cd /tmp/dmg-artifacts
          shasum -a 256 ./*.tar.gz ./*.dmg ./*.zip > checksums.txt
          cat checksums.txt

      # -------- Pre-release validation --------------------------------

      - name: Pre-release validation
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP=/tmp/ctxfs-build/Build/Products/Release/ContextFS.app
          DMG=/tmp/dmg-artifacts/ContextFS-${VERSION}.dmg

          echo "--- 1. cargo clippy ---"
          cargo clippy --all-targets --tests -- -D warnings

          echo "--- 2. cargo test (nfs backend) ---"
          CTXFS_BACKEND=nfs cargo test --workspace -- --test-threads=1

          echo "--- 3. --version matches VERSION ---"
          "target/aarch64-apple-darwin/release/ctxfs" --version | grep -F "$VERSION"
          "target/x86_64-apple-darwin/release/ctxfs" --version | grep -F "$VERSION"

          echo "--- 4. spctl accepts .app ---"
          spctl -a -vv "$APP"

          echo "--- 5. spctl accepts DMG ---"
          spctl -a -vv --type install "$DMG"

          echo "--- 6. codesign --verify clean ---"
          codesign --verify --strict --verbose=4 "$APP"

          echo "--- 7. every nested binary has hardened runtime + Developer ID ---"
          for bin in "$APP/Contents/MacOS/ctxfs" "$APP/Contents/MacOS/ctxfs-app-helper"; do
            if [ -f "$bin" ]; then
              codesign -dvvv "$bin" 2>&1 | grep -E "Authority=Developer ID|runtime"
            fi
          done

          echo "--- 8. Sparkle sig round-trip already verified in Sign step ---"

          echo "--- 9. unzipped .app runs --version ---"
          UNZIP_DIR=$(mktemp -d)
          ditto -xk "/tmp/dmg-artifacts/ContextFS-${VERSION}.zip" "$UNZIP_DIR"
          "$UNZIP_DIR/ContextFS.app/Contents/MacOS/ctxfs" --version | grep -F "$VERSION"

      # -------- Draft Release -----------------------------------------

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=".github/release-notes/${TAG}.md"
          cd /tmp/dmg-artifacts
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes-file "${GITHUB_WORKSPACE}/${NOTES}" \
            "ContextFS-${VERSION}.dmg" \
            "ContextFS-${VERSION}.zip" \
            "ContextFS-${VERSION}.zip.sig" \
            "ctxfs-${VERSION}-darwin-arm64.tar.gz" \
            "ctxfs-${VERSION}-darwin-x86_64.tar.gz" \
            "checksums.txt"
          echo "Draft release created: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

      # -------- Cleanup (runs even on failure) ------------------------

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
