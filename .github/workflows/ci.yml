name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Linux: install NFS client for mount.nfs
      - name: Install NFS client (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nfs-common

      # Clippy and test all crates except ctxfs-fuse (requires macFUSE/libfuse3).
      # ctxfs-fuse is a legacy crate kept for reference; the NFS backend is primary.
      - name: Clippy
        run: >-
          cargo clippy --tests
          -p ctxfs-core -p ctxfs-manifest -p ctxfs-cache -p ctxfs-ipc
          -p ctxfs-provider-git -p ctxfs-nfs -p ctxfs-daemon -p ctxfs

      - name: Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          cargo test
          -p ctxfs-core -p ctxfs-manifest -p ctxfs-cache -p ctxfs-ipc
          -p ctxfs-provider-git -p ctxfs-nfs -p ctxfs-daemon -p ctxfs

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
