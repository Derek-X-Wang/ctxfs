name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Linux: install NFS client for mount.nfs + protoc for fskit-rs prost build
      - name: Install NFS client + protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nfs-common protobuf-compiler

      # macOS: protoc + protoc-gen-swift (same set release.yml installs).
      # fskit-rs's build.rs uses prost-build which shells out to protoc.
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf swift-protobuf
          protoc --version
          protoc-gen-swift --version

      - name: Clippy
        run: cargo clippy --all-targets --tests

      - name: Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
